# Nginx Configuration for Propaganda Detector
# Save this as: /etc/nginx/sites-available/propaganda-detector

upstream backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name 13.235.248.64;

    # Redirect to HTTPS (optional - only if you have SSL set up)
    # return 301 https://$server_name$request_uri;

    # Root directory for static files
    root /home/ec2-user/propaganda-detector/dist;

    # Frontend routes
    location / {
        try_files $uri $uri/ /index.html;
        index index.html index.htm;
    }

    # Backend API proxy
    location /detect {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # FastAPI documentation
    location /docs {
        proxy_pass http://backend/docs;
    }

    location /redoc {
        proxy_pass http://backend/redoc;
    }

    location /openapi.json {
        proxy_pass http://backend/openapi.json;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;
}

