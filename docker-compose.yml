version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: propaganda-detector-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - propaganda-network

  # Frontend (React + Vite)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propaganda-detector-ui
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - propaganda-network
    environment:
      - VITE_API_URL=http://13.235.248.64:8000

networks:
  propaganda-network:
    driver: bridge
